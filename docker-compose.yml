services:
  postgres:
    image: postgres:16
    container_name: ytm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yt_manager
      POSTGRES_USER: yt_manager
      POSTGRES_PASSWORD: yt_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yt_manager -d yt_manager"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ytm_web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    command: sh -c "npm run prisma:deploy && npm run prisma:seed && npm run build && npm run start"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5

  haproxy:
    image: haproxy:2.9-alpine
    container_name: ytm_haproxy
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./infra/haproxy/certs:/usr/local/etc/haproxy/certs:ro

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ytm_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
    command: sh -c "npm run worker"

volumes:
  postgres_data:
