services:
  postgres:
    image: postgres:16
    container_name: ytm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yt_manager
      POSTGRES_USER: yt_manager
      POSTGRES_PASSWORD: yt_manager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yt_manager -d yt_manager"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ytm_web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    command: sh -c "npm run validate:runtime && npm run prisma:deploy && npm run prisma:seed && npm run build && npm run start"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5

  haproxy:
    build:
      context: ./infra/haproxy
      dockerfile: Dockerfile
    container_name: ytm_haproxy
    restart: unless-stopped
    depends_on:
      cert-init:
        condition: service_completed_successfully
      web:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/haproxy/certs:/usr/local/etc/haproxy/certs:ro

  cert-init:
    image: alpine:3.21
    container_name: ytm_cert_init
    restart: "no"
    env_file:
      - .env
    volumes:
      - ./infra/haproxy/certs:/certs
    command:
      - sh
      - -c
      - >
        apk add --no-cache openssl >/dev/null &&
        mkdir -p /certs &&
        CERT_CN=$$(printf '%s' "$$NEXT_PUBLIC_APP_URL" | sed -E 's#^https?://([^/:]+).*$#\1#') &&
        if [ ! -f /certs/ytm.pem ]; then
          openssl req -x509 -nodes -newkey rsa:2048 -keyout /certs/ytm.key -out /certs/ytm.crt -days 365 -subj "/CN=$${CERT_CN:-localhost}" &&
          cat /certs/ytm.key /certs/ytm.crt > /certs/ytm.pem;
        fi

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ytm_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
    command: sh -c "npm run worker"

volumes:
  postgres_data:
